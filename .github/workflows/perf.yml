name: Performance Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  performance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and start services
        run: |
          cp .env.example .env
          docker compose up --build -d
          echo "Waiting for app to be healthy..."
          timeout 120 bash -c 'until curl -sf http://localhost:8080/actuator/health; do sleep 3; done'

      - name: Load sample data
        run: |
          curl -sf -X POST http://localhost:8080/api/admin/sample-data \
            -H "X-API-Key: dev-key-change-in-production" \
            -H "Content-Type: application/json"

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run k6 load test
        run: |
          k6 run k6/ingest-load-test.js \
            -e BASE_URL=http://localhost:8080 \
            -e API_KEY=dev-key-change-in-production

      - name: Collect logs on failure
        if: failure()
        run: docker compose logs --tail=200

      - name: Teardown
        if: always()
        run: docker compose down -v
