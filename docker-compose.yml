services:
  db:
    image: postgres:16-alpine
    container_name: llm-analytics-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-llmanalytics}
      POSTGRES_USER: ${POSTGRES_USER:-llmanalytics}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-llmanalytics}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llm-analytics-app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-llmanalytics}
      POSTGRES_USER: ${POSTGRES_USER:-llmanalytics}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      APP_API_KEY: ${APP_API_KEY:-dev-key-change-in-production}
    restart: unless-stopped

volumes:
  postgres_data:
